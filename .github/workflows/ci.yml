name: CI — Build Check

on:
  push:
    branches: [develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Build success
        run: echo "Build passed — safe to merge"
